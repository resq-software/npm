name: Chromatic

on:
  pull_request:
    paths: ['packages/ui/**']
  push:
    branches:
      - master
    paths: ['packages/ui/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Required: Chromatic uses git history to determine which stories changed.
          fetch-depth: 0
      - uses: ./.github/actions/prepare
      - name: Build Storybook
        run: bun run build-storybook --quiet
        working-directory: packages/ui
      - name: Run Chromatic
        uses: chromaui/action@8a2b82547aef5a3efc8ec3c7905f4ab09a76ed0b # v15
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: packages/ui/storybook-static
          # Auto-accept changes when merging into master (sets new baseline).
          autoAcceptChanges: "master"
