name: Chromatic

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Required: Chromatic uses git history to determine which stories changed.
          fetch-depth: 0
      - uses: ./.github/actions/prepare
      - name: Build Storybook
        run: bun run build-storybook --quiet
      - name: Run Chromatic
        uses: chromaui/action@v15
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          # Auto-accept changes when merging into master (sets new baseline).
          autoAcceptChanges: "master"
