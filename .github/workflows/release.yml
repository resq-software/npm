concurrency:
  group: ${{ github.workflow }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        name: Set up git user and authentication
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: ./.github/actions/prepare
      - run: bun run build
      - name: Set up npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
      - name: Sync package version from npm when registry is ahead
        env:
          PACKAGE_NAME: "@resq-sw/ui"
        run: |
          REGISTRY_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)
          if [ -z "$REGISTRY_VERSION" ]; then
            echo "Package not found on npm yet; keeping package.json version unchanged."
            exit 0
          fi

          REGISTRY_VERSION="$REGISTRY_VERSION" node <<'EOF'
          const fs = require("fs");
          const packageJsonPath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          const registryVersion = process.env.REGISTRY_VERSION.trim();

          const parseVersion = (version) =>
            version.split(".").map((part) => Number.parseInt(part, 10));

          const compareVersions = (left, right) => {
            const a = parseVersion(left);
            const b = parseVersion(right);

            for (let index = 0; index < Math.max(a.length, b.length); index += 1) {
              const difference = (a[index] ?? 0) - (b[index] ?? 0);
              if (difference !== 0) {
                return difference;
              }
            }

            return 0;
          };

          if (compareVersions(registryVersion, packageJson.version) > 0) {
            packageJson.version = registryVersion;
            fs.writeFileSync(
              packageJsonPath,
              `${JSON.stringify(packageJson, null, 2)}\n`,
            );
            console.log(`Synced package.json version to ${registryVersion} from npm.`);
          } else {
            console.log(`package.json version ${packageJson.version} is current with npm.`);
          }
          EOF
      - uses: JoshuaKGoldberg/release-it-action@v0.4.0
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - id: stage_github_package
        name: Stage GitHub Packages publish artifact
        run: |
          PACK_FILENAME=$(npm pack --json --ignore-scripts | node -e 'const fs = require("node:fs"); const payload = JSON.parse(fs.readFileSync(0, "utf8")); process.stdout.write(payload[0].filename);')
          STAGING_DIR="$RUNNER_TEMP/resq-ui-github-package"

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          tar -xzf "$PACK_FILENAME" -C "$STAGING_DIR"

          STAGED_PACKAGE_DIR=$(node scripts/release/prepare-github-package.mjs "$STAGING_DIR/package")
          echo "staged_package_dir=$STAGED_PACKAGE_DIR" >> "$GITHUB_OUTPUT"
      - name: Set up GitHub Packages auth
        run: |
          echo "@resq-software:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
      - name: Publish package to GitHub Packages
        run: npm publish "${{ steps.stage_github_package.outputs.staged_package_dir }}" --ignore-scripts --registry https://npm.pkg.github.com

name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  id-token: write
  packages: write
