name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git user
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - uses: ./.github/actions/prepare

      - name: Set up npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Run Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          title: "[Release] Version Packages"
          commit: "chore: version packages"
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @resq-sw/ui to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/publish-github-packages
        with:
          package-dir: packages/ui
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish @resq-sw/dsa to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/publish-github-packages
        with:
          package-dir: packages/dsa
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish @resq-sw/helpers to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/publish-github-packages
        with:
          package-dir: packages/helpers
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish @resq-sw/http to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/publish-github-packages
        with:
          package-dir: packages/http
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish @resq-sw/logger to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/publish-github-packages
        with:
          package-dir: packages/logger
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish @resq-sw/decorators to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/publish-github-packages
        with:
          package-dir: packages/decorators
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish @resq-sw/rate-limiting to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/publish-github-packages
        with:
          package-dir: packages/rate-limiting
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish @resq-sw/security to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/publish-github-packages
        with:
          package-dir: packages/security
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
