name: Release (DSA)

on:
  push:
    tags:
      - '@resq-sw/dsa@v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build
        working-directory: packages/dsa
        run: bun run build

      - name: Publish to npm
        working-directory: packages/dsa
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access public
