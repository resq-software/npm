#
# Thin caller for the org-wide reusable security-scan workflow in
# resq-software/.github.

name: security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  scan:
    uses: resq-software/.github/.github/workflows/security-scan.yml@f4b51a620aa1bf89c0bce4f434b36f92ff7d517d # main
    with:
      languages: '["javascript-typescript","actions"]'
      enable-semgrep: true
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
