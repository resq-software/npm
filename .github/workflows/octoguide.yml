name: OctoGuide

on:
  discussion:
    types:
      - created
      - edited
  discussion_comment:
    types:
      - created
      - deleted
      - edited
  issue_comment:
    types:
      - created
      - deleted
      - edited
  issues:
    types:
      - edited
      - opened
  pull_request_review_comment:
    types:
      - created
      - deleted
      - edited
  pull_request_target: # zizmor: ignore[dangerous-triggers] -- needs write access; guarded by same-repo check below
    types:
      - edited
      - opened

permissions:
  discussions: write
  issues: write
  pull-requests: write

jobs:
  octoguide:
    if: ${{ !endsWith(github.actor, '[bot]') && (github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    steps:
      - uses: JoshuaKGoldberg/octoguide@e2c774d098e6b38c428bcd90dcca254389544aef # 0.21.10
        with:
          config: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}
